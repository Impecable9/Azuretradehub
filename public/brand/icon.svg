  <path d="M22 77 L50 21 L78 77" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="35" y1="58" x2="65" y2="58" stroke="white" stroke-width="9" stroke-linecap="round"/>
